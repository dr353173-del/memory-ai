<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Memory AI Pro</title>
<link rel="manifest" href="/manifest.json"/>
<meta name="theme-color" content="#a855f7"/>
<link rel="apple-touch-icon" href="/icon-192.png"/>

<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: system-ui, -apple-system, sans-serif;
  background: #0b1120;
  color: white;
  height: 100vh;
  display: flex;
  overflow: hidden;
}

/* ===== SIDEBAR ===== */
#sidebar {
  width: 280px;
  min-width: 280px;
  background: #0a0f1c;
  border-right: 1px solid #1f2937;
  display: flex;
  flex-direction: column;
  transition: 0.3s;
}
#sidebar.hidden { margin-left: -280px; }

.sidebar-head { padding: 14px; border-bottom: 1px solid #1f2937; }
.new-chat-btn {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #374151;
  background: linear-gradient(90deg, #7c3aed, #2563eb);
  color: white;
  cursor: pointer;
  font-weight: 600;
  font-size: 14px;
}
.new-chat-btn:hover { opacity: 0.9; }

.sidebar-nav {
  padding: 8px;
  border-bottom: 1px solid #1f2937;
}
.nav-item {
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  color: #d1d5db;
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 2px;
}
.nav-item:hover { background: #1f2937; }
.nav-item.active { background: #2563eb; color: white; }

.chat-list-header {
  padding: 12px 14px 6px;
  font-size: 11px;
  color: #6b7280;
  text-transform: uppercase;
  font-weight: 600;
}

.chat-list { flex: 1; overflow-y: auto; padding: 4px 8px; }
.chat-item {
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  color: #d1d5db;
  margin-bottom: 2px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.chat-item:hover { background: #1f2937; }
.chat-item.active { background: #2563eb; color: white; }
.chat-title {
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.chat-item .del-btn {
  background: none;
  border: none;
  color: #9ca3af;
  cursor: pointer;
  font-size: 14px;
  opacity: 0;
  transition: 0.2s;
  padding: 2px 6px;
}
.chat-item:hover .del-btn { opacity: 1; }
.chat-item .del-btn:hover { color: #ef4444; }

.sidebar-foot {
  padding: 12px;
  border-top: 1px solid #1f2937;
  display: flex;
  align-items: center;
  gap: 10px;
}
.user-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, #a855f7, #3b82f6);
}
.user-info { flex: 1; overflow: hidden; }
.user-info b { font-size: 13px; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-info small { font-size: 11px; color: #9ca3af; }
.logout-btn { background: none; border: none; color: #ef4444; cursor: pointer; font-size: 16px; }

/* ===== MAIN ===== */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: radial-gradient(circle at top, #1a0b2e, #0b1120 70%);
  min-width: 0;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 22px;
  border-bottom: 1px solid #1f2937;
}
.menu-btn { background: none; border: none; color: white; font-size: 22px; cursor: pointer; margin-right: 10px; }
.logo-area { display: flex; align-items: center; gap: 12px; }
.logo-icon {
  width: 42px; height: 42px;
  border-radius: 10px;
  background: linear-gradient(135deg, #a855f7, #3b82f6);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
}
.logo-text h1 {
  font-size: 18px; margin: 0;
  background: linear-gradient(90deg, #a855f7, #3b82f6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.logo-text p { font-size: 11px; margin: 0; color: #9ca3af; }
.header-btns { display: flex; gap: 8px; align-items: center; }
.install-btn, .voice-toggle {
  padding: 8px 14px;
  border-radius: 8px;
  border: none; color: white; cursor: pointer; font-weight: 500;
  font-size: 13px;
}
.install-btn { background: linear-gradient(90deg, #7c3aed, #2563eb); }
.voice-toggle { background: #10b981; }
.voice-toggle.off { background: #ef4444; }

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex; flex-direction: column;
  gap: 14px;
}

/* ===== WELCOME ===== */
.welcome { text-align: center; margin-top: 30px; padding: 0 20px; }
.brain {
  width: 80px; height: 80px;
  border-radius: 16px;
  background: linear-gradient(135deg, #a855f7, #3b82f6);
  display: flex; align-items: center; justify-content: center;
  font-size: 36px;
  margin: 0 auto 20px;
  box-shadow: 0 0 40px rgba(168, 85, 247, 0.4);
}
.welcome h2 { font-size: 28px; margin: 0; }
.welcome h2 em {
  font-style: normal;
  background: linear-gradient(90deg, #facc15, #f97316);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.welcome p { color: #9ca3af; margin-top: 6px; }

.start-chat-btn {
  margin-top: 24px;
  padding: 14px 32px;
  border-radius: 30px;
  border: none;
  background: linear-gradient(90deg, #7c3aed, #2563eb);
  color: white;
  cursor: pointer;
  font-weight: 600;
  font-size: 15px;
  box-shadow: 0 4px 20px rgba(124, 58, 237, 0.4);
}
.start-chat-btn:hover { transform: translateY(-2px); }

.demo-box {
  margin: 20px auto;
  max-width: 500px;
  background: rgba(168, 85, 247, 0.1);
  border: 1px solid rgba(168, 85, 247, 0.3);
  padding: 14px 18px;
  border-radius: 12px;
  text-align: left;
  font-size: 13px;
  color: #d1d5db;
}
.demo-box b { color: #a855f7; }

.cards {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  max-width: 600px;
  margin: 25px auto 0;
}
.card {
  background: #111827;
  padding: 16px;
  border-radius: 12px;
  cursor: pointer;
  border: 1px solid #1f2937;
  transition: 0.2s;
}
.card:hover { background: #1f2937; transform: translateY(-2px); }
.card h3 { margin: 0 0 4px; font-size: 15px; }
.card p { margin: 0; color: #9ca3af; font-size: 12px; }

/* ===== MESSAGES ===== */
.message {
  max-width: 75%;
  padding: 12px 16px;
  border-radius: 14px;
  line-height: 1.6;
  white-space: pre-wrap;
  font-size: 14px;
  word-wrap: break-word;
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.user { align-self: flex-end; background: linear-gradient(90deg, #2563eb, #1d4ed8); }
.bot { align-self: flex-start; background: #1f2937; }

/* ===== TYPING ANIMATION ===== */
.typing {
  align-self: flex-start;
  background: #1f2937;
  padding: 14px 20px;
  border-radius: 14px;
  display: flex;
  gap: 4px;
}
.typing span {
  width: 8px; height: 8px;
  background: #9ca3af;
  border-radius: 50%;
  animation: bounce 1.4s infinite;
}
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce {
  0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
  40% { transform: scale(1); opacity: 1; }
}

/* ===== INPUT ===== */
#inputArea {
  display: flex;
  padding: 14px;
  gap: 8px;
  border-top: 1px solid #1f2937;
  background: rgba(15,23,42,0.9);
}
input {
  flex: 1;
  padding: 12px;
  border-radius: 25px;
  border: none; outline: none;
  background: #1f2937; color: white;
  min-width: 0;
  font-size: 14px;
}
button.send {
  padding: 10px 20px;
  border-radius: 25px;
  border: none;
  background: linear-gradient(90deg, #7c3aed, #2563eb);
  color: white; cursor: pointer; font-weight: 600;
  white-space: nowrap;
}
button.send:disabled { opacity: 0.5; cursor: not-allowed; }
button.voice {
  border-radius: 50%;
  width: 42px; height: 42px;
  min-width: 42px;
  border: none;
  background: #1f2937;
  color: white; cursor: pointer;
  font-size: 18px;
}
button.voice.listening {
  background: #ef4444;
  animation: pulse 1s infinite;
}
@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}

footer { text-align: center; font-size: 12px; padding: 6px; color: #6b7280; }

/* ===== TOAST NOTIFICATION ===== */
#toast {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%);
  background: #1f2937;
  color: white;
  padding: 12px 20px;
  border-radius: 8px;
  border-left: 4px solid #10b981;
  font-size: 13px;
  z-index: 1000;
  display: none;
  animation: slideUp 0.3s ease;
}
#toast.error { border-left-color: #ef4444; }
@keyframes slideUp {
  from { opacity: 0; transform: translate(-50%, 20px); }
  to { opacity: 1; transform: translate(-50%, 0); }
}

/* ===== MODAL ===== */
.modal-bg {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.9);
  display: flex; align-items: center; justify-content: center;
  z-index: 999;
}
.modal {
  background: #111827;
  padding: 40px 30px;
  border-radius: 16px;
  max-width: 420px;
  width: 90%;
  text-align: center;
  border: 1px solid #1f2937;
  max-height: 85vh;
  overflow-y: auto;
}
.modal .brain-big {
  width: 70px; height: 70px;
  border-radius: 16px;
  background: linear-gradient(135deg, #a855f7, #3b82f6);
  display: flex; align-items: center; justify-content: center;
  font-size: 32px;
  margin: 0 auto 16px;
}
.modal h2 {
  margin: 0 0 8px;
  background: linear-gradient(90deg, #a855f7, #3b82f6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.modal p { color: #9ca3af; margin: 0 0 24px; font-size: 14px; }

.close-modal {
  position: absolute;
  top: 10px; right: 14px;
  background: none; border: none;
  color: white; font-size: 22px;
  cursor: pointer;
}

.google-btn {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #374151;
  background: white;
  color: #1f2937;
  cursor: pointer;
  font-weight: 500;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  font-size: 14px;
}
.google-btn:hover { background: #f3f4f6; }

/* ===== MEMORY/PROFILE/SETTINGS DASHBOARD ===== */
.dashboard {
  text-align: left;
  max-height: 60vh;
  overflow-y: auto;
}
.memory-item {
  background: #1f2937;
  padding: 12px 16px;
  border-radius: 10px;
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.memory-item .label {
  color: #a855f7;
  font-weight: 600;
  font-size: 12px;
  text-transform: uppercase;
}
.memory-item .value {
  color: white;
  font-size: 14px;
  margin-top: 2px;
}
.memory-item .del-mem {
  background: #ef4444;
  border: none;
  color: white;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
}

.setting-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 0;
  border-bottom: 1px solid #1f2937;
}
.setting-row:last-child { border-bottom: none; }
.setting-row .label { font-size: 14px; }
.setting-row .desc { font-size: 11px; color: #9ca3af; margin-top: 2px; }

.danger-btn {
  background: #ef4444;
  border: none;
  color: white;
  padding: 8px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
}

.star-rating {
  font-size: 32px;
  cursor: pointer;
  user-select: none;
  margin: 10px 0;
}
.star { color: #374151; }
.star.active { color: #facc15; }

textarea {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #374151;
  background: #1f2937;
  color: white;
  font-family: inherit;
  resize: vertical;
  min-height: 80px;
  outline: none;
}

/* ===== OVERLAY ===== */
#sidebarOverlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 99;
}
#sidebarOverlay.active { display: block; }

/* ===== MOBILE ===== */
@media (max-width: 768px) {
  body { display: block; height: 100vh; overflow: hidden; }
  #sidebar {
    position: fixed; top: 0; left: 0;
    height: 100vh; width: 280px;
    z-index: 100; margin-left: 0;
    transform: translateX(0);
    transition: transform 0.3s ease;
    box-shadow: 2px 0 20px rgba(0,0,0,0.5);
  }
  #sidebar.hidden { margin-left: 0; transform: translateX(-100%); box-shadow: none; }
  #main { width: 100%; height: 100vh; }
  header { padding: 10px 12px; }
  .logo-icon { width: 34px; height: 34px; font-size: 16px; border-radius: 8px; }
  .logo-text h1 { font-size: 15px; }
  .logo-text p { font-size: 9px; }
  .install-btn, .voice-toggle { padding: 6px 10px; font-size: 11px; }
  .welcome h2 { font-size: 22px; }
  .brain { width: 60px; height: 60px; font-size: 28px; }
  .cards { grid-template-columns: 1fr; padding: 0 10px; }
  .message { max-width: 88%; font-size: 13px; }
  #inputArea { padding: 10px; gap: 6px; }
  input { padding: 10px 14px; font-size: 14px; }
  button.send { padding: 10px 14px; font-size: 13px; }
  button.voice { width: 38px; height: 38px; min-width: 38px; }
  .modal { padding: 30px 20px; }
}
</style>
</head>
