<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Memory AI Pro</title>
<style>
body { font-family: Arial; background: #111; color: white; margin: 0; }
#chat { height: 80vh; overflow-y: auto; padding: 20px; }
.message { margin: 10px 0; }
.user { color: #4fc3f7; }
.bot { color: #81c784; }
input { width: 70%; padding: 10px; }
button { padding: 10px; }
</style>
</head>
<body>

<h2 style="padding:20px;">Memory AI Pro</h2>

<div id="chat"></div>

<div style="padding:20px;">
<input id="input" placeholder="Type message..." />
<button onclick="sendMessage()">Send</button>
<button onclick="startVoice()">🎤</button>
<input type="file" id="fileInput" />
<button onclick="uploadFile()">Upload</button>
</div>

<script>
const chatDiv = document.getElementById("chat");

function addMessage(text, className) {
    const div = document.createElement("div");
    div.className = "message " + className;
    div.innerText = text;
    chatDiv.appendChild(div);
    chatDiv.scrollTop = chatDiv.scrollHeight;
}

async function sendMessage() {
    const input = document.getElementById("input");
    const message = input.value;
    if (!message) return;

    addMessage("You: " + message, "user");
    input.value = "";

    const response = await fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({user_id: "default", message})
    });

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let botText = "";
    const botDiv = document.createElement("div");
    botDiv.className = "message bot";
    chatDiv.appendChild(botDiv);

    while(true) {
        const {done, value} = await reader.read();
        if(done) break;
        const chunk = decoder.decode(value);
        botText += chunk;
        botDiv.innerText = "AI: " + botText;
        chatDiv.scrollTop = chatDiv.scrollHeight;
    }

    speak(botText);
}

function startVoice() {
    const recognition = new webkitSpeechRecognition();
    recognition.onresult = function(event) {
        document.getElementById("input").value =
            event.results[0][0].transcript;
    };
    recognition.start();
}

function speak(text) {
    const speech = new SpeechSynthesisUtterance(text);
    speechSynthesis.speak(speech);
}

async function uploadFile() {
    const fileInput = document.getElementById("fileInput");
    const file = fileInput.files[0];
    const formData = new FormData();
    formData.append("file", file);

    await fetch("/upload", {
        method: "POST",
        body: formData
    });

    alert("File uploaded!");
}
</script>

</body>
</html>
