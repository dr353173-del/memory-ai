<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Memory AI Pro</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: system-ui, -apple-system, sans-serif;
  background: linear-gradient(135deg, #0f172a, #0b1120);
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ===== HEADER ===== */

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 25px;
  background: rgba(15, 23, 42, 0.8);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid #1f2937;
}

.logo {
  font-size: 18px;
  font-weight: 600;
}

.install-btn {
  padding: 8px 14px;
  border-radius: 8px;
  background: linear-gradient(90deg, #7c3aed, #2563eb);
  border: none;
  color: white;
  cursor: pointer;
  font-weight: 500;
}

.install-btn:hover {
  opacity: 0.9;
}

/* ===== CHAT AREA ===== */

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 25px;
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.message {
  max-width: 70%;
  padding: 12px 16px;
  border-radius: 12px;
  line-height: 1.6;
  white-space: pre-wrap;
  font-size: 14px;
}

.user {
  align-self: flex-end;
  background: linear-gradient(90deg, #2563eb, #1d4ed8);
}

.bot {
  align-self: flex-start;
  background: #1f2937;
}

/* ===== INPUT AREA ===== */

#inputArea {
  display: flex;
  padding: 15px;
  background: rgba(15, 23, 42, 0.9);
  border-top: 1px solid #1f2937;
  gap: 10px;
}

input {
  flex: 1;
  padding: 12px;
  border-radius: 8px;
  border: none;
  outline: none;
  background: #1f2937;
  color: white;
}

button {
  padding: 10px 14px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  background: #2563eb;
  color: white;
  font-weight: 500;
}

button:hover {
  background: #1d4ed8;
}
</style>
</head>

<body>

<header>
  <div class="logo">🧠 Memory AI Pro</div>
  <button class="install-btn" id="installBtn" style="display:none;">Install App</button>
</header>

<div id="chat"></div>

<div id="inputArea">
  <input id="input" placeholder="Type your message..." />
  <button onclick="sendMessage()">Send</button>
  <button onclick="startVoice()">🎤</button>
</div>

<script>
const chatDiv = document.getElementById("chat");

function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = "message " + type;
  div.innerText = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
  return div;
}

async function sendMessage() {
  const input = document.getElementById("input");
  const message = input.value.trim();
  if (!message) return;

  addMessage(message, "user");
  input.value = "";

  const botDiv = addMessage("...", "bot");

  const response = await fetch("/chat", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ user_id: "default", message })
  });

  const reader = response.body.getReader();
  const decoder = new TextDecoder();
  let botText = "";

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    const chunk = decoder.decode(value);
    botText += chunk;
    botDiv.innerText = botText;
    chatDiv.scrollTop = chatDiv.scrollHeight;
  }

  speak(botText);
}

function startVoice() {
  const recognition = new webkitSpeechRecognition();
  recognition.onresult = function(event) {
    document.getElementById("input").value =
      event.results[0][0].transcript;
  };
  recognition.start();
}

function speak(text) {
  const speech = new SpeechSynthesisUtterance(text);
  speechSynthesis.speak(speech);
}

document.getElementById("input").addEventListener("keypress", function(e) {
  if (e.key === "Enter") sendMessage();
});

/* ===== PWA INSTALL BUTTON ===== */

let deferredPrompt;

window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById("installBtn").style.display = "block";
});

document.getElementById("installBtn").addEventListener("click", async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt = null;
  }
});
</script>

</body>
</html>
